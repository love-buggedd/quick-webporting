<!DOCTYPE html>
<html lang="en-us">
<head>
  <base href="https://cdn.jsdelivr.net/gh/bandit968thegamer-ops/undertale@main/undertale/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
  <title>UNDERTALE</title>
  <style>
    @keyframes rotation {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      min-width: 100vw;
      display: flex;
      flex-direction: column;
      place-items: center;
      background-color: black;
    }

    .emscripten {
      padding-right: 0;
      display: block;
    }

    div.emscripten {
      text-align: center;
      font-family: "Lucida Console", Monaco, monospace;
    }

    canvas.emscripten {
      display: none;
      background-color: black;
      opacity: 0;
      transition: opacity 0.5s ease-in;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      outline: none;
    }

    canvas.active {
      opacity: 1;
      animation: fadeIn 0.5s;
    }

    canvas.paused {
      animation: blur 0.5s;
      filter: blur(2px) grayscale(1);
    }

    canvas.unpaused {
      animation: none;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes blur {
      from { filter: blur(0) grayscale(0); }
      to { filter: blur(2px) grayscale(1); }
    }

    .spinner {
      height: 30px;
      width: 30px;
      animation: rotation 0.8s linear infinite;
      border: 5px solid #bdff00;
      border-top: 5px solid #719900;
      border-radius: 100%;
    }

    #status {
      display: inline-block;
      vertical-align: top;
      font-weight: bold;
      color: white;
    }

    #progress {
      width: 250px;
      height: 10px;
      appearance: none;
      padding: 5px;
    }

    progress[value]::-webkit-progress-bar {
      background-color: #8492a6;
      height: 10px;
      border-radius: 15px;
    }

    progress[value]::-webkit-progress-value {
      background-image: -webkit-linear-gradient(left, #719900, #bdff00);
      height: 10px;
      border-radius: 15px;
    }

    div.loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      z-index: 20;
    }

    div.loading > * {
      padding: 10px;
      margin: 10px;
    }

    #message-container {
      display: none;
      min-height: 50px;
      background-color: rgba(20, 20, 20, 0.5);
      width: 100%;
      position: absolute;
      top: 0;
      left: 0;
    }

    #messages {
      margin-left: 50px;
      color: white;
      font-family: "Lucida Console", Monaco, monospace;
      padding: 0;
    }

    #pauseMenuContainer {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 30;
    }

    #pauseMenuContainer[hidden] {
      display: none !important;
      opacity: 0;
    }

    #pauseMenuBorder {
      background: linear-gradient(135deg, #FA1E4E, transparent 40%);
      padding: 1px;
      border-radius: 4px;
      clip-path: polygon(10.5px 0, 100% 0, 100% 100%, 0 100%, 0 10.5px);
      width: 70vw;
      max-width: 400px;
    }

    #pauseMenu {
      display: flex;
      flex-direction: column;
      padding: 60px 30px;
      background: linear-gradient(180deg, #2E273F 16.15%, rgba(46, 39, 63, 0.79) 56.25%, #2E273F 91.15%);
      border-radius: 4px;
      clip-path: polygon(10px 0, 100% 0, 100% 100%, 0 100%, 0 10px);
      animation: fadeIn 0.5s;
      opacity: 1;
    }

    #pauseMenu button {
      font-weight: 500;
      font-size: 17px;
      color: white;
      background: #FA1E4E;
      border: 1px solid #FA1E4E;
      border-radius: 6px;
      padding: 12px 24px;
      margin: 5px 0;
      user-select: none;
    }

    #pauseMenu button#quitButton {
      background: #FA1E4E40;
    }

    #pauseMenu button[hidden] {
      display: none;
    }
  </style>
</head>
<body>
  <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>

  <div id="pauseMenuContainer" hidden>
    <div id="pauseMenuBorder">
      <div id="pauseMenu">
        <button id="resumeButton" onclick="resume()">Resume</button>
        <button id="quitButton" onclick="quitIfSupported()">Quit</button>
      </div>
    </div>
  </div>

  <div class="loading">
    <div class="spinner" id="spinner"></div>
    <div class="emscripten" id="status">Downloading...</div>
    <progress value="0" max="100" id="progress" hidden></progress>
  </div>

  <div id="message-container">
    <div id="messages"></div>
  </div>

  <script id="tick-worker" type="javascript/worker">
    let timer = null;
    self.onmessage = function (e) {
      if (e.data && e.data.run) {
        const fps = e.data.fps || 60;
        if (timer) clearInterval(timer);
        timer = setInterval(() => postMessage({}), 1000 / fps);
      } else {
        if (timer) clearInterval(timer);
        timer = null;
      }
    };
  </script>

  <script>
    const blob = new Blob([document.querySelector('#tick-worker').textContent], { type: 'application/javascript' });
    const worker = new Worker(URL.createObjectURL(blob));

    worker.onmessage = function () {
      if (typeof GM_tick === 'function') GM_tick(performance.now());
    };

    const isMultiplayer = function () {
      if (typeof GM_is_multiplayer !== 'function') return false;
      return GM_is_multiplayer() !== 0;
    };

    document.addEventListener('visibilitychange', function () {
      if (!isMultiplayer()) return;
      if (document.visibilityState === 'hidden') {
        worker.postMessage({ run: true, fps: 60 });
      } else {
        worker.postMessage({ run: false });
      }
    });
  </script>

  <script>
    function mergeFiles(fileParts) {
      return new Promise((resolve, reject) => {
        const buffers = [];

        function fetchPart(index) {
          if (index >= fileParts.length) {
            const mergedBlob = new Blob(buffers);
            const mergedFileUrl = URL.createObjectURL(mergedBlob);
            resolve(mergedFileUrl);
            return;
          }

          fetch(fileParts[index])
            .then((response) => {
              if (!response.ok) throw new Error("Failed to fetch " + fileParts[index]);
              return response.arrayBuffer();
            })
            .then((data) => {
              buffers.push(data);
              fetchPart(index + 1);
            })
            .catch(reject);
        }

        fetchPart(0);
      });
    }

    function getParts(file, start, end) {
      const parts = [];
      for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
      }
      return parts;
    }

    mergeFiles(getParts("game.unx", 1, 5)).then((url) => {
      window.gameUnxUrl = url;

      const originalFetch = window.fetch;
      window.fetch = async function (...args) {
        let [url, options] = args;
        if (typeof url === 'string' && url.includes("game.unx")) {
          url = window.gameUnxUrl;
        } else if (url instanceof Request && url.url.includes("game.unx")) {
          url = new Request(window.gameUnxUrl, url);
        }
        return originalFetch.call(this, url, options);
      };

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function (method, url, ...rest) {
        if (typeof url === 'string' && url.includes("game.unx")) {
          url = window.gameUnxUrl;
        }
        return originalOpen.call(this, method, url, ...rest);
      };

      const index = document.createElement("script");
      index.src = "index.js";
      document.body.appendChild(index);

      const runner = document.createElement("script");
      runner.src = "runner.js";
      document.body.appendChild(runner);
    }).catch((error) => {
      console.error("Failed to merge files:", error);
      const status = document.getElementById("status");
      if (status) status.textContent = "Failed to load game files.";
    });
  </script>
</body>
</html>
