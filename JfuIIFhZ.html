<!DOCTYPE html>
<html lang="en">
<head>
  <base href="https://cdn.jsdelivr.net/gh/genizy/fnaf@main/3/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="HandheldFriendly" content="true">
  <title>Five Nights at Freddy's 3</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #game-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #MMFCanvas {
      display: block;
      width: min(100vw, calc(100vh * 16 / 9));
      height: min(100vh, calc(100vw * 9 / 16));
      max-width: 100%;
      max-height: 100%;
    }

    #progress-container {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 280px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.85);
      color: #fff;
      font-family: sans-serif;
      font-size: 14px;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(0,0,0,.3);
      z-index: 9999;
      text-align: center;
    }
  </style>
</head>
<body>
  <div id="game-shell">
    <canvas id="MMFCanvas" width="1280" height="720">
      Your browser does not support Canvas, Please try again.
    </canvas>
  </div>

  <div id="progress-container">
    <div style="margin-bottom: 6px;">
      Downloading... <span id="download-text">0%</span>
    </div>
    <div style="width: 100%; background: #444; border-radius: 6px; overflow: hidden;">
      <div id="download-bar" style="height: 10px; background: #3b82f6; width: 0%; transition: width 0.2s;"></div>
    </div>

    <div style="margin: 12px 0 6px;">
      Extracting... <span id="extract-text">0%</span>
    </div>
    <div style="width: 100%; background: #444; border-radius: 6px; overflow: hidden;">
      <div id="extract-bar" style="height: 10px; background: #10b981; width: 0%; transition: width 0.2s;"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="Runtime.js"></script>
  <script src="main.js"></script>
</body>
</html>
