<!DOCTYPE html>
<html lang="en">
<head>
  <base href="https://cdn.jsdelivr.net/gh/web-ports/saihate-station@main/">
  <meta charset="UTF-8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" href="icon/icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon/icon.png">
  <link rel="stylesheet" type="text/css" href="css/game.css">
  <title>Saihate Station</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      background-color: black;
    }

    #loading-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: monospace;
      font-size: 28px;
      text-align: center;
      z-index: 9999;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="loading-text">LOADING...</div>

  <script src="js/main.js"></script>
  <script>
    function hideLoadingWhenReady() {
      try {
        const gameCanvas = document.querySelector("#gameCanvas");
        if (gameCanvas) {
          const loading = document.getElementById("loading-text");
          if (loading) loading.remove();
          return true;
        }
      } catch (e) {}
      return false;
    }

    const loadingPoll = setInterval(() => {
      if (hideLoadingWhenReady()) {
        clearInterval(loadingPoll);
      }
    }, 100);

    function applycanvasmode() {
      let w = 0;
      let h = 0;
      const maxW = window.innerWidth;
      const maxH = window.innerHeight;

      if ((maxW * 0.75) > maxH) {
        h = maxH;
        w = Math.floor((maxH / 3) * 4);
      } else {
        w = maxW;
        h = Math.floor((maxW / 4) * 3);
      }

      try {
        document.querySelector("#gameCanvas").style.width = w + "px";
        document.querySelector("#gameCanvas").style.height = h + "px";
        document.querySelector("#gameVideo").style.width = w + "px";
        document.querySelector("#gameVideo").style.height = h + "px";
        document.querySelector("#upperCanvas").style.width = w + "px";
        document.querySelector("#upperCanvas").style.height = h + "px";
      } catch (e) {}
    }

    setInterval(applycanvasmode, 100);

    (function () {
      const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
      if (!isMobile) return;

      let i = setInterval(function () {
        if (window.fullSetupComplete) {
          let zoneStatic = document.createElement("div");
          zoneStatic.style = "position: fixed; bottom: 0; left: 0; z-index: 9999; width: 500px; height: 500px;";

          let internal = document.createElement("div");
          internal.style = "position: relative; width: 100%; height: 100%;";
          zoneStatic.appendChild(internal);

          let joystick = nipplejs.create({
            mode: "semi",
            zone: internal,
            color: "red",
            catchDistance: 30
          });

          setTimeout(function () {
            joystick.on("dir", function (e, data) {
              let dirs = ["up", "down", "left", "right"];
              for (let o of dirs) {
                if (o !== data.direction.angle) {
                  fakeInput.up(o);
                } else {
                  fakeInput.down(o);
                }
              }
            });

            joystick.on("end", function () {
              let dirs = ["up", "down", "left", "right"];
              for (let o of dirs) {
                fakeInput.up(o);
              }
            });
          }, 100);

          document.body.appendChild(zoneStatic);

          const createButton = (text, key, bottom, right, bgColor) => {
            let button = document.createElement("div");
            button.style = `
              position: fixed;
              bottom: ${bottom};
              right: ${right};
              width: 10vw;
              height: 10vw;
              background: ${bgColor};
              color: white;
              touch-action: none;
              z-index: 999999;
              display: flex;
              align-items: center;
              justify-content: center;
              font-family: sans-serif;
              font-size: 3vw;
              border-radius: 50%;
            `;
            button.innerText = text;

            button.addEventListener("touchstart", function (e) {
              e.preventDefault();
              fakeInput.down(key);
            });

            button.addEventListener("touchend", function (e) {
              e.preventDefault();
              fakeInput.up(key);
            });

            document.body.appendChild(button);
            return button;
          };

          createButton("OK", "ok", "5vw", "5vw", "#0f08");
          createButton("ESC", "escape", "5vw", "15vw", "#f008");
          createButton("TAG", "tag", "15vw", "15vw", "#00f8");
          createButton("RUN", "shift", "15vw", "5vw", "#f0f8");

          clearInterval(i);
        }
      }, 100);
    })();
  </script>
</body>
</html>
