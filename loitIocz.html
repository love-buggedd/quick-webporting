<!DOCTYPE html>
<html lang="en-us">
<head>
  <base href="https://cdn.jsdelivr.net/gh/aukak/hollow-knight@main/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  <title>Hollow Knight</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #loading-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: monospace;
      font-size: 28px;
      text-align: center;
      z-index: 20;
    }

    #unity-canvas {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="loading-text">LOADING...</div>
  <canvas id="unity-canvas" tabindex="-1"></canvas>

  <script src="Build/hktruffled.loader.js"></script>
  <script>
    const canvas = document.getElementById("unity-canvas");
    const loadingText = document.getElementById("loading-text");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      canvas.style.width = window.innerWidth + "px";
      canvas.style.height = window.innerHeight + "px";
    }

    resizeCanvas();
    window.addEventListener("resize", resizeCanvas);

    function getParts(file, start, end) {
      const parts = [];
      for (let i = start; i <= end; i++) parts.push(file + ".part" + i);
      return parts;
    }

    function mergeFiles(fileParts, label) {
      return new Promise((resolve, reject) => {
        const buffers = [];
        const total = fileParts.length;

        function fetchPart(index) {
          if (index >= total) {
            resolve(URL.createObjectURL(new Blob(buffers)));
            return;
          }

          fetch(fileParts[index])
            .then((response) => {
              if (!response.ok) {
                throw new Error("Failed to fetch " + fileParts[index] + " (" + response.status + ")");
              }
              return response.arrayBuffer();
            })
            .then((data) => {
              buffers.push(data);
              const pct = Math.round(((index + 1) / total) * 100);
              loadingText.textContent = "LOADING " + label + "... " + pct + "%";
              fetchPart(index + 1);
            })
            .catch(reject);
        }

        fetchPart(0);
      });
    }

    Promise.all([
      mergeFiles(getParts("Build/hktruffled.data", 1, 45), "DATA"),
      mergeFiles(getParts("Build/hktruffled.wasm", 1, 2), "CODE")
    ]).then(([dataUrl, wasmUrl]) => {
      canvas.style.display = "block";
      loadingText.textContent = "STARTING...";

      return createUnityInstance(canvas, {
        dataUrl: dataUrl,
        frameworkUrl: "Build/hktruffled.framework.js",
        codeUrl: wasmUrl,
        streamingAssetsUrl: "StreamingAssets",
        companyName: "Unknown",
        productName: "Hollow Knight",
        productVersion: "1.0"
      });
    }).then(() => {
      loadingText.remove();
    }).catch((err) => {
      console.error(err);
      loadingText.textContent = "FAILED TO LOAD";
    });
  </script>
</body>
</html>
