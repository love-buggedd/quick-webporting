<!DOCTYPE html>
<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@main/kindergarten/1/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Kindergarten</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #231F20;
        }

        #loading-text {
            color: white;
            font-family: monospace;
            font-size: 48px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        #unity-canvas {
            width: 100%;
            height: 100%;
            display: block;
            background: #231F20;
        }
    </style>
</head>
<body>
    <div id="loading-text">LOADING...</div>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/Build.loader.js"></script>
    <script>
        const canvas = document.querySelector("#unity-canvas");

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";
        }

        resizeCanvas();
        window.addEventListener("resize", resizeCanvas);

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        resolve(URL.createObjectURL(new Blob(buffers)));
                        return;
                    }

                    fetch(fileParts[index])
                        .then((response) => {
                            if (!response.ok) throw new Error("Failed to load " + fileParts[index]);
                            return response.arrayBuffer();
                        })
                        .then((data) => {
                            buffers.push(data);
                            fetchPart(index + 1);
                        })
                        .catch(reject);
                }

                fetchPart(0);
            });
        }

        Promise.all([
            mergeFiles([
                "Build/Build.wasm.part1",
                "Build/Build.wasm.part2",
                "Build/Build.wasm.part3"
            ])
        ]).then(([wasmUrl]) => {
            createUnityInstance(canvas, {
                dataUrl: "Build/Build.data",
                frameworkUrl: "Build/Build.framework.js",
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Con Man Games",
                productName: "Kindergarten",
                productVersion: "1.0"
            }).then(() => {
                document.querySelector("#loading-text").remove();
            }).catch((err) => {
                console.error(err);
                document.querySelector("#loading-text").textContent = "FAILED TO LOAD";
            });
        }).catch((err) => {
            console.error(err);
            document.querySelector("#loading-text").textContent = "FAILED TO LOAD";
        });
    </script>
</body>
</html>
