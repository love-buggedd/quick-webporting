<!DOCTYPE html>
<html lang="en-us">
<head>
  <base href="https://cdn.jsdelivr.net/gh/web-ports/soft-and-wet@main/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0">
  <title>Soft and Wet</title>
  <link rel="stylesheet" href="style.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #canvas {
      display: none;
      background: #000;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      outline: none;
    }

    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: white;
      font-family: monospace;
      text-align: center;
      z-index: 20;
      background: #000;
    }

    #spinner {
      width: 42px;
      height: 42px;
      border: 4px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 12px;
    }

    #status {
      margin-bottom: 10px;
      min-height: 20px;
    }

    #progress {
      width: min(80vw, 320px);
      height: 16px;
    }

    #message-container,
    #pauseMenuContainer,
    #QRCode,
    #QR2Code,
    #QRButton,
    #QR2Button,
    #resumeButton,
    #quitButton,
    #output-container {
      display: none;
    }

    #output {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <canvas id="canvas" tabindex="-1"></canvas>

  <div id="loader">
    <div id="spinner"></div>
    <div id="status">Downloading...</div>
    <progress value="0" max="100" id="progress"></progress>
  </div>

  <div id="message-container"><div id="messages"></div></div>
  <div id="pauseMenuContainer"></div>
  <div id="QRCode"></div>
  <div id="QR2Code"></div>
  <button id="QRButton" type="button"></button>
  <button id="QR2Button" type="button"></button>
  <button id="resumeButton" type="button"></button>
  <button id="quitButton" type="button"></button>
  <div id="output-container"><textarea id="output"></textarea></div>

  <script>
    const statusEl = document.getElementById("status");
    const progressEl = document.getElementById("progress");

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function setProgress(value) {
      progressEl.hidden = false;
      progressEl.value = value;
    }

    function getParts(file, start, end) {
      const parts = [];
      for (let i = start; i <= end; i++) {
        parts.push(file + ".part" + i);
      }
      return parts;
    }

    function mergeFiles(fileParts) {
      return new Promise((resolve, reject) => {
        const buffers = [];
        const total = fileParts.length;

        function fetchPart(index) {
          if (index >= total) {
            resolve(URL.createObjectURL(new Blob(buffers)));
            return;
          }

          fetch(fileParts[index])
            .then((r) => {
              if (!r.ok) throw new Error("Failed to fetch " + fileParts[index]);
              return r.arrayBuffer();
            })
            .then((data) => {
              buffers.push(data);
              setStatus("Downloading game files...");
              setProgress(Math.min(90, 10 + Math.round(((index + 1) / total) * 70)));
              fetchPart(index + 1);
            })
            .catch(reject);
        }

        fetchPart(0);
      });
    }

    function addScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement("script");
        s.src = src;
        s.onload = resolve;
        s.onerror = () => reject(new Error("Failed to load script: " + src));
        document.body.appendChild(s);
      });
    }

    mergeFiles(getParts("game.unx", 1, 8)).then((gameUrl) => {
      const originalFetch = window.fetch.bind(window);
      window.fetch = async function (...args) {
        let [url, options] = args;

        if (typeof url === "string" && url.includes("game.unx")) {
          url = gameUrl;
        } else if (url instanceof Request && url.url.includes("game.unx")) {
          url = new Request(gameUrl, url);
        }

        return originalFetch(url, options);
      };

      const originalOpen = XMLHttpRequest.prototype.open;
      XMLHttpRequest.prototype.open = function (method, url, ...rest) {
        if (typeof url === "string" && url.includes("game.unx")) {
          url = gameUrl;
        }
        return originalOpen.call(this, method, url, ...rest);
      };

      setStatus("Preparing assets...");
      setProgress(92);

      return addScript("index.js").then(() => addScript("runner.js"));
    }).then(() => {
      setProgress(100);
      document.getElementById("loader").style.display = "none";
    }).catch((err) => {
      console.error(err);
      setStatus("Failed to load game.");
      progressEl.hidden = true;
      document.getElementById("spinner").style.display = "none";
    });
  </script>
</body>
</html>
