<!DOCTYPE html>
<html lang="en-us">
<head>
  <base href="https://cdn.jsdelivr.net/gh/web-ports/celeste@main/">
  <meta charset="utf-8">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes">
  <title>Celeste</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    #loading-textt {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-family: monospace;
      font-size: 28px;
      text-align: center;
      z-index: 9999;
      pointer-events: none;
    }

    #interstitial {
      display: none;
    }
  </style>
</head>
<body>
  <div id="loading-textt">LOADING DOT.NET...</div>
  <div id="interstitial"></div>

  <script src="cfg.js"></script>
  <script src="data.js"></script>
  <script type="module" src="bundle.js"></script>
</body>
</html>
