<html lang="en-us">
<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@main/baldi-plus/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Unity WebGL Player | Baldi's Basics Plus</title>
    <style>
        html, body {
            background: black;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            height: 100%;
        }

        #loading-text {
            color: white;
            font-family: monospace;
            font-size: 48px;
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        #unity-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="loading-text">LOADING...</div>
    <canvas id="unity-canvas" tabindex="-1" hidden></canvas>

    <script src="Build/BaldiPlusNew.loader.js"></script>
    <script>
        const canvas = document.querySelector("#unity-canvas");
        const loadingText = document.querySelector("#loading-text");

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        const mergedBlob = new Blob(buffers);
                        const mergedFileUrl = URL.createObjectURL(mergedBlob);
                        resolve(mergedFileUrl);
                        return;
                    }

                    fetch(fileParts[index])
                        .then((response) => {
                            if (!response.ok) throw new Error("Failed to load " + fileParts[index]);
                            return response.arrayBuffer();
                        })
                        .then((data) => {
                            buffers.push(data);
                            fetchPart(index + 1);
                        })
                        .catch(reject);
                }

                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            canvas.style.width = "100%";
            canvas.style.height = "100%";
            canvas.style.position = "fixed";
            canvas.style.top = "0";
            canvas.style.left = "0";
        } else {
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
            }
            resizeCanvas();
            window.addEventListener("resize", resizeCanvas);
        }

        Promise.all([
            mergeFiles(getParts("Build/BaldiPlusNew.data", 1, 5)),
            mergeFiles(getParts("Build/BaldiPlusNew.wasm", 1, 2))
        ]).then(([dataUrl, wasmUrl]) => {
            canvas.hidden = false;

            createUnityInstance(canvas, {
                dataUrl: dataUrl,
                frameworkUrl: "Build/BaldiPlusNew.framework.js",
                codeUrl: wasmUrl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Basically Games",
                productName: "Baldi's Basics Plus",
                productVersion: "1.0"
            }).then(() => {
                loadingText.remove();
            }).catch((err) => {
                console.error(err);
                loadingText.textContent = "FAILED TO LOAD";
            });
        }).catch((err) => {
            console.error(err);
            loadingText.textContent = "FAILED TO LOAD";
        });
    </script>
</body>
</html>
